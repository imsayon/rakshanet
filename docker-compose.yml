services:
    zookeeper:
        image: confluentinc/cp-zookeeper:7.4.0
        environment:
            ZOOKEEPER_CLIENT_PORT: 2181
            ZOOKEEPER_TICK_TIME: 2000

    kafka:
        image: confluentinc/cp-kafka:7.4.0
        depends_on: [zookeeper]
        ports: ["9092:9092"]
        environment:
            KAFKA_BROKER_ID: 1
            KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
            KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
            KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
            KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
        healthcheck:
            test: kafka-topics --bootstrap-server kafka:9092 --list
            interval: 10s
            timeout: 10s
            retries: 5

    redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru

    postgres:
        image: postgres:15-alpine
        ports: ["5433:5432"]
        environment:
            POSTGRES_DB: fraud_detection
            POSTGRES_USER: sentinel
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentinel2024}
        volumes:
            - ./data/schema/init.sql:/docker-entrypoint-initdb.d/init.sql
            - pgdata:/var/lib/postgresql/data

    neo4j:
        image: neo4j:5.9.0
        ports: ["7474:7474", "7687:7687"]
        environment:
            NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-sentinel2024}
            NEO4J_PLUGINS: '["graph-data-science"]'
        volumes:
            - neo4jdata:/data

    txn-ingestion:
        build: ./services/txn-ingestion
        ports: ["8000:8000"]
        depends_on:
            kafka:
                condition: service_healthy
        env_file: .env
        environment:
            KAFKA_BOOTSTRAP: kafka:9092
            PYTHONUNBUFFERED: "1"
            REDIS_URL: redis://redis:6379
            POSTGRES_DSN: postgresql://sentinel:${POSTGRES_PASSWORD:-sentinel2024}@postgres:5432/fraud_detection

    feature-engine:
        build: ./services/feature-engine
        depends_on:
            kafka:
                condition: service_healthy
        env_file: .env
        environment:
            KAFKA_BOOTSTRAP: kafka:9092
            PYTHONUNBUFFERED: "1"
            REDIS_URL: redis://redis:6379

    decision-engine:
        build: ./services/decision-engine
        ports: ["8001:8001"]
        depends_on:
            kafka:
                condition: service_healthy
        env_file: .env
        environment:
            KAFKA_BOOTSTRAP: kafka:9092
            PYTHONUNBUFFERED: "1"
            REDIS_URL: redis://redis:6379
            RULE_ENGINE_URL: http://rule-engine:9001
            XGBOOST_URL: http://xgboost-service:9002
            GNN_URL: http://gnn-service:9003
            LSTM_URL: http://lstm-service:9004
            NLP_URL: http://nlp-service:9005
            ENSEMBLE_URL: http://ensemble:8002

    rule-engine:
        build: ./services/models/rule-engine
        ports: ["9001:9001"]

    xgboost-service:
        build: ./services/models/xgboost-service
        ports: ["9002:9002"]
        volumes:
            - ./models:/models:z

    gnn-service:
        build: ./services/models/gnn-service
        ports: ["9003:9003"]
        environment:
            REDIS_URL: redis://redis:6379
            NEO4J_URI: bolt://neo4j:7687
            NEO4J_PASSWORD: ${NEO4J_PASSWORD:-sentinel2024}
        volumes:
            - ./models:/models:z

    lstm-service:
        build: ./services/models/lstm-service
        ports: ["9004:9004"]
        environment:
            POSTGRES_DSN: postgresql://sentinel:${POSTGRES_PASSWORD:-sentinel2024}@postgres:5432/fraud_detection
        volumes:
            - ./models:/models:z

    nlp-service:
        build: ./services/models/nlp-service
        ports: ["9005:9005"]
        volumes:
            - ./models:/models:z

    ensemble:
        build: ./services/ensemble
        ports: ["8002:8002"]
        volumes:
            - ./models:/models:z

    action-executor:
        build: ./services/action-executor
        ports: ["8003:8003"]
        depends_on:
            kafka:
                condition: service_healthy
        environment:
            KAFKA_BOOTSTRAP: kafka:9092
            PYTHONUNBUFFERED: "1"
            POSTGRES_DSN: postgresql://sentinel:${POSTGRES_PASSWORD:-sentinel2024}@postgres:5432/fraud_detection

    dashboard:
        build: ./services/dashboard
        ports: ["8010:8010"]
        depends_on:
            postgres:
                condition: service_started
        environment:
            POSTGRES_DSN: postgresql://sentinel:${POSTGRES_PASSWORD:-sentinel2024}@postgres:5432/fraud_detection

volumes:
    pgdata:
    neo4jdata:
